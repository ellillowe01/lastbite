name: lastbite
description: LastBite - Selamatkan makananmu sebelum terlambat!
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  intl: ^0.19.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4
  flutter_timezone: ^5.0.0
  device_calendar: ^4.3.3
  google_mlkit_text_recognition: ^0.13.0
  percent_indicator: ^4.2.3
  url_launcher: ^6.2.6
  http: ^1.2.1
  webview_flutter: ^4.7.0
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon_source.png"
  remove_alpha_ios: true